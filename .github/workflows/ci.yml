name: CI Pipeline

on:
  push:
    branches:
      - dev

jobs:
  dev-branch:
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.test-result.outputs.test_result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Run tests
        id: test
        run: |
          python -m unittest discover -s tests -v

      - name: Set test result
        id: test-result
        run: |
          echo "test_result=${{ steps.test.outcome }}" >> $GITHUB_ENV

  merge-to-master:
    runs-on: ubuntu-latest
    needs: dev-branch
    if: ${{ needs.dev-branch.outputs.test_result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Git user name and email
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Fast-forward master branch
        run: |
          git checkout master
          git pull origin master --rebase
          if ! git merge dev --allow-unrelated-histories; then
            echo "Merge failed. Inspecting the details..."
            git status
            git log --oneline -n 10
            exit 1
          fi
          git push origin master

  failure-recovery:
    runs-on: ubuntu-latest
    needs: dev-branch
    if: ${{ needs.dev-branch.outputs.test_result == 'failure' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Reset dev branch
        run: |
          git fetch origin
          git checkout dev
          git reset --hard HEAD~1

      - name: Create failure branch
        run: |
          failure_branch="failure/$(date +%s)"
          git checkout -b $failure_branch
          git push origin $failure_branch
