name: CI Pipeline

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  dev-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Run tests
        run: |
          python -m unittest discover -s tests -v

  merge-to-master:
    runs-on: ubuntu-latest
    needs: dev-branch
    if: ${{ success() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Git user name and email
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Update master branch
        run: |
          git checkout master
          git pull origin master

      - name: Merge dev into master
        run: |
          git merge dev --no-edit || exit 1

      - name: Push changes to master
        run: git push origin master

  failure-recovery:
    runs-on: ubuntu-latest
    needs: merge-to-master
    if: ${{ failure() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch all branches
        run: git fetch origin

      - name: Remove failing commit from dev and create failure branch
        run: |
          # Identifiez le dernier commit échoué
          failing_commit=$(git log -1 --pretty=format:%H)
          
          # Réinitialisez dev pour retirer ce commit
          git checkout dev
          git reset --hard HEAD~1
          git push --force origin dev
          
          # Créez une branche pour le commit échoué
          failure_branch="failures/$(date +%s)"
          git checkout -b $failure_branch $failing_commit
          git push origin $failure_branch

      - name: Log information
        run: |
          echo "Le commit $failing_commit a été déplacé vers la branche $failure_branch."
