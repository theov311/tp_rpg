name: CI Pipeline

on:
  push:
    branches:
      - dev

jobs:
  dev-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Run tests
        run: |
          python -m unittest discover -s tests -v

  merge-to-master:
    runs-on: ubuntu-latest
    needs: dev-branch
    if: ${{ success() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Git user name and email
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Fast-forward master branch
        run: |
          git checkout master
          git merge --ff-only dev
          git push origin master

  failure-recovery:
    runs-on: ubuntu-latest
    needs: dev-branch
    if: ${{ failure() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch all branches
        run: git fetch origin

      - name: Ensure dev branch is up to date
        run: |
          git checkout dev
          git reset --hard origin/dev

      - name: Remove failing commit from dev and create failure branch
        run: |
          failing_commit=$(git log -1 --pretty=format:%H)
          git reset --hard HEAD~1
          git push --force origin dev
          failure_branch="failures/$(date +%s)"
          git checkout -b $failure_branch $failing_commit
          git push origin $failure_branch

      - name: Log information
        run: |
          echo "Commit $failing_commit moved to branch $failure_branch."
