name: CI Pipeline

on:
  push:
    branches:
      - dev

jobs:
  dev-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Run tests
        id: run-tests
        run: |
          python -m unittest discover -s tests -v
      - name: Set output based on test result
        if: failure()
        run: echo "test_result=failure" >> $GITHUB_ENV
      - name: Set output based on test success
        if: success()
        run: echo "test_result=success" >> $GITHUB_ENV

  merge-to-master:
    runs-on: ubuntu-latest
    needs: dev-branch
    if: env.test_result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Git user name and email
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Fast-forward master branch
        run: |
          git checkout master
          git pull origin master --rebase
          git merge dev --allow-unrelated-histories
          git push origin master

  failure-recovery:
    runs-on: ubuntu-latest
    needs: dev-branch
    if: env.test_result == 'failure'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Reset dev branch to previous commit
        run: |
          git fetch origin
          git checkout dev
          git reset --hard HEAD~1

      - name: Create failure branch
        run: |
          failure_branch="failure/$(date +%s)"
          git checkout -b $failure_branch
          git push origin $failure_branch

      - name: Log error information
        run: |
          echo "Tests failed. Last 10 commits:"
          git log -n 10 --oneline
